
<style>
  /* ============================================
     GREETING WIDGET — EDITABLE STYLES
  ============================================ */

  body {
    margin: 0;
    padding: 20px 24px;
    background-color: rgb(25, 25, 25);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .greeting-name {
    font-size: 2rem;
    font-weight: 600;
    color: #fff;
    margin: 0 0 4px 0;
    line-height: 1.2;
  }

  .greeting-prefix {
    color: #CD4946;
  }

  .greeting-date {
    font-size: 1.2rem;
    color: #888;
    margin: 0;
    font-weight: 400;
  }

  .greeting-clock {
    font-size: 3rem;
    font-weight: 500;
    color: #aaa;
    font-variant-numeric: tabular-nums;
    margin: 0;
    line-height: 1.2;
  }

  .greeting-clock-label {
    font-size: 11px;
    color: #aaa;
    text-align: right;
    margin: 4px 0 0 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ============================================
     END OF EDITABLE STYLES
  ============================================ */
</style>

<div class="left">
  <p class="greeting-name">
    <span class="greeting-prefix" id="greeting-prefix">Bom dia</span>, Guilherme
  </p>
  <p class="greeting-date" id="greeting-date"></p>
</div>

<div class="right">
  <p class="greeting-clock" id="greeting-clock"></p>
  <p class="greeting-clock-label">Londrina, BR</p>
</div>

<script>
  /* ============================================
     EDITABLE SETTINGS
  ============================================ */
  const LOCALE = "pt-BR";
  const TIMEZONE = "America/Sao_Paulo";
  /* ============================================
     END OF EDITABLE SETTINGS
  ============================================ */

  function getGreeting(hour) {
    if (hour >= 5 && hour < 12)  return "Bom dia";
    if (hour >= 12 && hour < 18) return "Boa tarde";
    return "Boa noite";
  }

  function getHour(now) {
    return parseInt(now.toLocaleTimeString("en-US", {
      timeZone: TIMEZONE, hour: "numeric", hour12: false
    }), 10);
  }

  function update() {
    const now = new Date();
    const hour = getHour(now);

    document.getElementById("greeting-prefix").textContent = getGreeting(hour);

    document.getElementById("greeting-date").textContent = now.toLocaleDateString(LOCALE, {
      timeZone: TIMEZONE, weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    document.getElementById("greeting-clock").textContent = now.toLocaleTimeString(LOCALE, {
      timeZone: TIMEZONE, hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
  }

  update();
  setInterval(update, 1000);
</script>
