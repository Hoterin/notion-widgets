
<style>
  /* ============================================
     COUNTDOWN WIDGET — EDITABLE STYLES
  ============================================ */

  body {
    margin: 0;
    padding: 20px 24px;
    background-color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .countdown-label {
    font-size: 12px;
    font-weight: 500;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 6px 0;
  }

  .countdown-value {
    font-size: 36px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 0;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .countdown-unit {
    font-size: 13px;
    font-weight: 400;
    color: #aaa;
    margin-left: 4px;
  }

  .countdown-sub {
    font-size: 12px;
    color: #bbb;
    margin: 6px 0 0 0;
  }

  .divider {
    border: none;
    border-top: 1px solid #ebebeb;
    margin: 16px 0;
  }

  /* ============================================
     END OF EDITABLE STYLES
  ============================================ */
</style>

<p class="countdown-label" id="label-1"></p>
<p class="countdown-value" id="value-1"></p>
<p class="countdown-sub" id="sub-1"></p>

<hr class="divider">

<p class="countdown-label" id="label-2"></p>
<p class="countdown-value" id="value-2"></p>
<p class="countdown-sub" id="sub-2"></p>

<script>
  /* ============================================
     EDITABLE SETTINGS
  ============================================ */
  const TIMEZONE = "America/Sao_Paulo";

  const COUNTDOWNS = [
    {
      label: "Days to turn 20",
      target: "2027-01-01", // Change to your actual birthday
      unit: "days",
      sub: "First freelance income before this"
    },
    {
      label: "Current course",
      target: "2026-06-01", // Change to your goal finish date for HTML & CSS
      unit: "days",
      sub: "Goal: finish HTML & CSS — Origamid"
    }
  ];
  /* ============================================
     END OF EDITABLE SETTINGS
  ============================================ */

  function daysUntil(dateStr) {
    const now = new Date(new Date().toLocaleString("en-US", { timeZone: TIMEZONE }));
    const target = new Date(dateStr);
    const diff = target - now;
    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
  }

  COUNTDOWNS.forEach((c, i) => {
    const n = i + 1;
    const days = daysUntil(c.target);
    document.getElementById(`label-${n}`).textContent = c.label;
    document.getElementById(`value-${n}`).innerHTML =
      days + `<span class="countdown-unit">${c.unit}</span>`;
    document.getElementById(`sub-${n}`).textContent = c.sub;
  });
</script>
