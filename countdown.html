<style>
  /* ============================================
     COUNTDOWN WIDGET — EDITABLE STYLES
  ============================================ */

  body {
    margin: 0;
    background-color: rgb(80, 44, 41);
    font-family: monospace;
  }

  .countdown-label {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    text-decoration: underline;
    font-weight: bold;
    letter-spacing: 0.06em;
    margin: 0 0 16px 0;
    margin-top: 1px;
    display: none;
  }

  .countdown-value {
    font-size: 36px;
    font-weight: 600;
    color: #fff;
    margin: 0;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .countdown-unit {
    font-size: 13px;
    font-weight: 400;
    color: #aaa;
    margin-left: 4px;
  }

  .countdown-sub {
    font-size: 12px;
    color: #bbb;
    margin: 6px 0 0 0;
  }

  .divider {
    border: none;
    border-top: 1px solid #ebebeb;
    margin: 16px 0;
  }

  .countdown {
    background-color: #383836;
  }

  /* ============================================
     END OF EDITABLE STYLES
  ============================================ */
</style>

<div class="coutdown">
  <p class="countdown-label" id="label-1"></p>
  <p class="countdown-value" id="value-1"></p>
  <p class="countdown-sub" id="sub-1"></p>
</div>

<script>
  /* ============================================
     EDITABLE SETTINGS
  ============================================ */
  const TIMEZONE = "America/Sao_Paulo";

  const COUNTDOWNS = [
    {
      label: "Days to turn 20",
      target: "2026-11-14", // Change to your actual birthday
      unit: "days",
      sub: "First freelance income before this"
    },
  ];
  /* ============================================
     END OF EDITABLE SETTINGS
  ============================================ */

  function daysUntil(dateStr) {
    const now = new Date(new Date().toLocaleString("en-US", { timeZone: TIMEZONE }));
    const target = new Date(dateStr);
    const diff = target - now;
    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
  }

  COUNTDOWNS.forEach((c, i) => {
    const n = i + 1;
    const days = daysUntil(c.target);
    document.getElementById(`label-${n}`).textContent = c.label;
    document.getElementById(`value-${n}`).innerHTML =
      days + `<span class="countdown-unit">${c.unit}</span>`;
    document.getElementById(`sub-${n}`).textContent = c.sub;
  });
</script>
