<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Streak</title>
  <style>
    /* ============================================
       GYM STREAK WIDGET — EDITABLE STYLES
    ============================================ */

    body {
      margin: 0;
      background-color: #502c29;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #flame {
      width: 24px;
      height: 24px;
      display: inline-block;
      transition: filter 0.4s ease;
    }

    /* Full color — trained today */
    #flame.state-done {
      filter: none;
    }

    /* Black and white — not yet trained today */
    #flame.state-pending {
      filter: grayscale(100%) opacity(50%);
    }

    /* Hidden — streak reset or rest day with no entry */
    #flame.state-hidden {
      display: none;
    }

    .info {}

    .streak-label {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 4px 0;
    }

    .streak-value {
      font-size: 36px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .streak-unit {
      font-size: 14px;
      font-weight: 400;
      color: #aaa;
      margin-left: 4px;
    }

    .streak-sub {
      font-size: 12px;
      color: #bbb;
      margin: 5px 0 0 0;
    }

    /* ============================================
       END OF EDITABLE STYLES
    ============================================ */
  </style>
</head>
<body>

  <div class="info">
    <p class="streak-label">Gym streak</p>
    <p class="streak-value">
      <span id="streak-number">—</span>
      <img id="flame" src="./img/fire-icon.svg" alt="flame" class="state-hidden" />
      <span class="streak-unit">days</span>
    </p>
    <p class="streak-sub" id="streak-sub">loading...</p>
  </div>

  <script>
    /* ============================================
       EDITABLE SETTINGS
    ============================================ */
    const API_URL = "https://notion-widgets-neon.vercel.app/api/streak";
    /* ============================================
       END OF EDITABLE SETTINGS
    ============================================ */

    async function loadStreak() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const flame = document.getElementById("flame");
        const number = document.getElementById("streak-number");
        const sub = document.getElementById("streak-sub");

        if (data.streak === undefined) throw new Error("No data");

        number.textContent = data.streak;

        if (data.todayStatus === "done") {
          flame.className = "state-done";
          sub.textContent = "Trained today. Keep the chain going.";
        } else if (data.todayStatus === "pending") {
          flame.className = "state-pending";
          sub.textContent = "Not trained yet today.";
        } else if (data.todayStatus === "rest") {
          flame.className = "state-hidden";
          sub.textContent = "Rest day today.";
        }

      } catch (err) {
        document.getElementById("streak-number").textContent = "—";
        document.getElementById("streak-sub").textContent = "Could not load streak.";
      }
    }

    loadStreak();

    // Refresh every 5 minutes so it updates when you check the task
    setInterval(loadStreak, 5 * 60 * 1000);
  </script>

</body>
</html>
