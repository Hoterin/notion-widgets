<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Streak</title>
  <style>
    /* ============================================
       GYM STREAK WIDGET — EDITABLE STYLES
    ============================================ */

    body {
      margin: 0;
      padding: 20px 24px;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .streak-label {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 6px 0;
    }

    .streak-value {
      font-size: 36px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .streak-unit {
      font-size: 14px;
      font-weight: 400;
      color: #aaa;
      margin-left: 4px;
    }

    .streak-sub {
      font-size: 12px;
      color: #bbb;
      margin: 6px 0 0 0;
    }

    .streak-error {
      font-size: 12px;
      color: #e57373;
      margin: 6px 0 0 0;
    }

    /* ============================================
       END OF EDITABLE STYLES
    ============================================ */
  </style>
</head>
<body>

  <p class="streak-label">Gym streak</p>
  <p class="streak-value">
    <span id="streak-number">—</span>
    <span class="streak-unit">days</span>
  </p>
  <p class="streak-sub" id="streak-sub">loading...</p>

  <script>
    /* ============================================
       EDITABLE SETTINGS
    ============================================ */
    const API_URL = "https://YOUR-VERCEL-PROJECT.vercel.app/api/streak";
    // Replace with your actual Vercel URL after deploying
    /* ============================================
       END OF EDITABLE SETTINGS
    ============================================ */

    async function loadStreak() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.streak !== undefined) {
          document.getElementById("streak-number").textContent = data.streak;
          document.getElementById("streak-sub").textContent =
            data.streak > 0
              ? "Keep it going, don't break the chain."
              : "Time to get back in the gym.";
        } else {
          throw new Error("No streak value");
        }
      } catch (err) {
        document.getElementById("streak-number").textContent = "—";
        document.getElementById("streak-sub").className = "streak-error";
        document.getElementById("streak-sub").textContent = "Could not load streak.";
      }
    }

    loadStreak();
  </script>

</body>
</html>
